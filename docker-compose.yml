
services:
  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    profiles:
      - init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_MODEL: ${OLLAMA_BASE_MODEL:-qwen2.5-coder:1.5b}
      OLLAMA_CUSTOM_MODEL: ${OLLAMA_CUSTOM_MODEL:-asisto-coder}
    volumes:
      - ./docker/ollama:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/pull-model.sh"]

  backend:
    build: ./backend
    restart: always
    depends_on:
      - ollama
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-asisto-coder}
      PUTER_AUTH_TOKEN: ${PUTER_AUTH_TOKEN:-}
      PUTER_MODEL: ${PUTER_MODEL:-}
    ports:
      - "4000:4000"
    volumes:
      - knowledge_data:/app/data
      - ./environments:/app/environments

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3100:3000"
    volumes:
      - ./environments:/app/environments

  prometheus:
    image: prom/prometheus
    restart: always
    depends_on:
      - backend
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3301:3000"

volumes:
  grafana_data:
  knowledge_data:
  ollama_data:
  prometheus_data:
